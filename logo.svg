<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Shield background -->
  <path d="M 100 20 L 160 50 L 160 110 Q 100 170 100 170 Q 100 170 40 110 L 40 50 Z" fill="#003366" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Stars (representing USA) -->
  <g fill="#FFD700">
    <!-- Star 1 -->
    <polygon points="100,35 105,48 119,48 108,57 113,70 100,61 87,70 92,57 81,48 95,48"/>
    <!-- Star 2 -->
    <polygon points="70,65 73,74 83,74 76,80 79,89 70,83 61,89 64,80 57,74 67,74"/>
    <!-- Star 3 -->
    <polygon points="130,65 133,74 143,74 136,80 139,89 130,83 121,89 124,80 117,74 127,74"/>
  </g>
  
  <!-- Text on banner -->
  <rect x="40" y="120" width="120" height="30" fill="#FFD700" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#003366">US ARMY</text>
  <text x="100" y="148" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#003366">OKINAWA</text>
  
  <!-- Decorative wreath elements -->
  <g stroke="#FFD700" stroke-width="1.5" fill="none">
    <path d="M 55 100 Q 45 100 45 110"/>
    <path d="M 145 100 Q 155 100 155 110"/>
  </g>
</svg>