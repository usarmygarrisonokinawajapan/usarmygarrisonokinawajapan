<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>User Profile - US Army Garrison Okinawa Japan</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Profile Page Specific Styles */
        body {
            background: linear-gradient(135deg, #1a3a6f 0%, #2a4f8f 50%, #1e3f5a 100%);
        }

        .background-container {
            display: none;
        }

        .profile-page-container {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        .profile-page-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 40px;
            box-sizing: border-box;
        }

        .profile-page-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.4));
        }

        .profile-page-title {
            text-align: center;
            flex: 1;
            color: white;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .profile-page-actions {
            display: flex;
            gap: 10px;
        }

        .lang-toggle {
            padding: 8px 14px;
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.25);
            color: white;
            border-radius: 22px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.35s ease;
            backdrop-filter: blur(15px);
        }

        .lang-toggle:hover {
            background: rgba(255, 255, 255, 0.45);
            border-color: white;
        }

        .lang-toggle.active {
            background: rgba(188, 0, 45, 0.9);
            border-color: white;
        }

        .profile-page-card {
            background: linear-gradient(135deg, rgba(26, 58, 111, 0.95) 0%, rgba(42, 79, 143, 0.95) 50%, rgba(30, 63, 90, 0.95) 100%);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 30px;
        }

        .profile-page-picture {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #FFD700;
            object-fit: cover;
            margin: 0 auto 30px;
            display: block;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }

        .profile-field {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .profile-field-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .profile-field-value {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .profile-field-value.gold {
            color: #FFD700;
            font-size: 18px;
        }

        .profile-page-actions-footer {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
        }

        .btn-back {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .btn-logout {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #FF6B6B;
            background: rgba(255, 107, 107, 0.2);
            color: #FF6B6B;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(255, 107, 107, 0.35);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .profile-page-container {
                padding: 10px;
            }

            .profile-page-header {
                padding: 15px 10px;
                margin-bottom: 20px;
            }

            .profile-page-title {
                font-size: 18px;
            }

            .profile-page-card {
                padding: 25px;
                border-radius: 15px;
            }

            .profile-page-picture {
                width: 120px;
                height: 120px;
            }

            .profile-field {
                padding: 12px;
                margin-bottom: 15px;
            }

            .profile-field-value {
                font-size: 14px;
            }

            .profile-page-actions-footer {
                flex-direction: column;
                gap: 10px;
            }

            .logout-modal {
                width: calc(100% - 20px);
                padding: 20px;
            }

            .logout-modal-title {
                font-size: 20px;
            }

            .logout-modal-message {
                font-size: 14px;
                margin-bottom: 20px;
            }

            .logout-modal-buttons {
                flex-direction: column;
                gap: 10px;
            }
        }

        @media (max-width: 640px) {
            .profile-page-header {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
                padding: 12px 8px;
            }

            .profile-page-logo {
                width: 56px;
                height: 56px;
            }

            .profile-page-title {
                order: 3;
                flex: 0 0 100%;
                font-size: 20px;
                margin-top: 4px;
            }

            .profile-page-actions {
                order: 2;
            }

            .lang-toggle {
                padding: 7px 10px;
                font-size: 11px;
            }
        }

        @media (min-width: 481px) and (max-width: 1024px) {
            .profile-page-container {
                padding: 30px 20px;
            }

            .profile-page-card {
                max-width: 650px;
                padding: 35px;
            }
        }

        @media (min-width: 1025px) {
            .profile-page-container {
                padding: 40px 20px;
            }

            .profile-page-card {
                max-width: 700px;
            }
        }

        /* Loading Bar Styles */
        .loading-bar-container {
            width: 100%;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.4) 0%, rgba(255, 215, 0, 0.7) 50%, rgba(255, 215, 0, 0.4) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            position: relative;
            transition: width 0.03s linear;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4), inset 0 1px 3px rgba(255, 255, 255, 0.2);
        }

        .loading-bar-text {
            color: white;
            font-weight: 700;
            font-size: 14px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Gradient animation for loading bar */
        @keyframes barGradient {
            0% {
                background: linear-gradient(90deg, rgba(255, 215, 0, 0.4) 0%, rgba(255, 215, 0, 0.7) 50%, rgba(255, 215, 0, 0.4) 100%);
            }
            50% {
                background: linear-gradient(90deg, rgba(255, 215, 0, 0.5) 0%, rgba(255, 255, 200, 0.8) 50%, rgba(255, 215, 0, 0.5) 100%);
            }
            100% {
                background: linear-gradient(90deg, rgba(255, 215, 0, 0.4) 0%, rgba(255, 215, 0, 0.7) 50%, rgba(255, 215, 0, 0.4) 100%);
            }
        }

        .loading-bar.animate {
            animation: barGradient 2s ease-in-out infinite;
        }

        /* Logout Confirmation Modal */
        .logout-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .logout-modal-overlay.active {
            display: flex;
        }

        .logout-modal {
            background: linear-gradient(135deg, rgba(26, 58, 111, 0.95) 0%, rgba(42, 79, 143, 0.95) 100%);
            border-radius: 16px;
            padding: 30px;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(255, 215, 0, 0.2);
            border: 2px solid rgba(255, 215, 0, 0.3);
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        .logout-modal-title {
            color: #FFD700;
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 15px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .logout-modal-message {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            margin: 0 0 30px 0;
            line-height: 1.5;
        }

        .logout-modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .logout-modal-btn {
            padding: 12px 24px;
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
            max-width: 150px;
        }

        .logout-btn-yes {
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.3) 0%, rgba(255, 150, 150, 0.2) 100%);
            color: #FF6B6B;
            border-color: #FF6B6B;
        }

        .logout-btn-yes:hover {
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.45) 0%, rgba(255, 150, 150, 0.35) 100%);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
            transform: translateY(-2px);
        }

        .logout-btn-no {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3) 0%, rgba(255, 215, 0, 0.15) 100%);
            color: #FFD700;
            border-color: #FFD700;
        }

        .logout-btn-no:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.4) 0%, rgba(255, 215, 0, 0.25) 100%);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="profile-page-container">

            <div style="background: rgba(255, 215, 0, 0.1); border: 2px solid rgba(255, 215, 0, 0.3); border-radius: 12px; padding: 20px; margin-top: 30px;">
                <h3 class="profile-details-title" data-ja="検証詳細" data-en="Verification Details" style="color: #FFD700; margin-bottom: 25px;">検証詳細</h3>

                    <p style="color: rgba(255, 255, 255, 0.9); margin: 0 0 30px 0; border-left: 3px solid #FFD700; padding-left: 10px;" data-ja="BNB 検証" data-en="BNB VERIFICATION">BNB VERIFICATION</p>
                    
                    <!-- Loading Bar -->
                    <div style="margin-top: 20px; margin-bottom: 30px;">

                            <div class="loading-bar" id="loadingBar">
                                <span class="loading-bar-text" id="loadingBarText">0%</span>

                    <div style="display: flex; gap: 15px; align-items: flex-start; margin-top: 25px;">

                <a href="https://line.me/ti/p/LXrw-MFkJx" target="_blank" style="display: block; width: 100%; padding: 12px 20px; background: linear-gradient(135deg, rgba(255, 215, 0, 0.3) 0%, rgba(255, 215, 0, 0.15) 100%); border: 2px solid #FFD700; color: #FFD700; border-radius: 8px; text-align: center; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; margin-top: 15px; transition: all 0.3s ease;" data-ja="連絡先" data-en="Contact" onmouseover="this.style.background='linear-gradient(135deg, rgba(255, 215, 0, 0.4) 0%, rgba(255, 215, 0, 0.25) 100%)'; this.style.boxShadow='0 0 20px rgba(255, 215, 0, 0.5)';" onmouseout="this.style.background='linear-gradient(135deg, rgba(255, 215, 0, 0.3) 0%, rgba(255, 215, 0, 0.15) 100%)'; this.style.boxShadow='none';">連絡先</a>

        <!-- Logout Confirmation Modal -->

    <script src="script.js"></script>
    <script>
        // Profile Page Specific Script
        document.addEventListener('DOMContentLoaded', function() {
            const langToggles = document.querySelectorAll('.lang-toggle');
            const backBtn = document.getElementById('backBtn');
            const logoutBtn = document.getElementById('logoutBtn');

            // Load saved language preference
            const savedLang = localStorage.getItem('preferredLanguage') || 'ja';
            switchLanguage(savedLang);

            // Language toggle
            langToggles.forEach(button => {
                button.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    switchLanguage(lang);
                    langToggles.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // Back button - return to homepage
            if (backBtn) {
                backBtn.addEventListener('click', function() {
                    window.location.href = 'index.html';
                });
            }

            // Logout Confirmation Modal
            const logoutModalOverlay = document.getElementById('logoutModalOverlay');
            const logoutYesBtn = document.getElementById('logoutYesBtn');
            const logoutNoBtn = document.getElementById('logoutNoBtn');

            // Logout button - show confirmation modal
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (logoutModalOverlay) {
                        logoutModalOverlay.classList.add('active');
                    }
                });
            }

            // Logout Yes button
            if (logoutYesBtn) {
                logoutYesBtn.addEventListener('click', function() {
                    localStorage.removeItem('userLoggedIn');
                    localStorage.removeItem('profileDisplayed');
                    localStorage.removeItem('lastActivityTime');
                    window.location.href = 'index.html';
                });
            }

            // Logout No button
            if (logoutNoBtn) {
                logoutNoBtn.addEventListener('click', function() {
                    if (logoutModalOverlay) {
                        logoutModalOverlay.classList.remove('active');
                    }
                });
            }

            // Close modal when clicking outside
            if (logoutModalOverlay) {
                logoutModalOverlay.addEventListener('click', function(e) {
                    if (e.target === this) {
                        this.classList.remove('active');
                    }
                });
            }

            // Idle Time Tracking (30 seconds)
            let idleTimer = null;
            const IDLE_TIMEOUT = 30000; // 30 seconds

            function resetIdleTimer() {
                clearTimeout(idleTimer);
                localStorage.setItem('lastActivityTime', Date.now());

                idleTimer = setTimeout(function() {
                    // Auto logout after 30 seconds of inactivity
                    const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
                    if (isLoggedIn) {
                        localStorage.removeItem('userLoggedIn');
                        localStorage.removeItem('profileDisplayed');
                        localStorage.removeItem('lastActivityTime');
                        alert(currentLanguage === 'ja' ? 'セッションタイムアウト: 30秒間操作がなかったためログアウトしました。' : 'Session Timeout: You have been logged out due to inactivity.');
                        window.location.href = 'index.html';
                    }
                }, IDLE_TIMEOUT);
            }

            // Track user activity
            const activityEvents = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'];
            activityEvents.forEach(event => {
                document.addEventListener(event, resetIdleTimer, true);
            });

            // Start idle timer on page load
            resetIdleTimer();

            // Loading Bar Scroll Animation
            const loadingBar = document.getElementById('loadingBar');
            const loadingBarText = document.getElementById('loadingBarText');
            const loadingBarContainer = document.getElementById('loadingBarContainer');
            let hasAnimated = false;

            function animateLoadingBar() {
                if (hasAnimated) return;

                hasAnimated = true;
                loadingBar.classList.add('animate');

                let currentWidth = 0;
                const targetWidth = 75;
                const duration = 3000; // 3 seconds
                const steps = 100;
                const stepDuration = duration / steps;

                const interval = setInterval(() => {
                    if (currentWidth < targetWidth) {
                        currentWidth += targetWidth / steps;
                        loadingBar.style.width = currentWidth + '%';
                        loadingBarText.textContent = Math.round(currentWidth) + '%';
                    } else {
                        currentWidth = targetWidth;
                        loadingBar.style.width = targetWidth + '%';
                        loadingBarText.textContent = '75%';
                        clearInterval(interval);
                    }
                }, stepDuration);
            }

            // Intersection Observer to trigger animation when scrolled into view
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !hasAnimated) {
                        animateLoadingBar();
                    }
                });
            }, { threshold: 0.5 });

            if (loadingBarContainer) {
                observer.observe(loadingBarContainer);
            }
        });
    </script>
</body>
</html>
